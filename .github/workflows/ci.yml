name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.26.3"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make fmt-check
      - run: make vet
      - run: go build ./...
      - run: make test

  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make depcheck

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build all release targets
        run: |
          set -eu
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
              go build -trimpath ./...
            echo "ok $target"
          done

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci

  # ffmpeg is a TEST ORACLE only, never a runtime dependency (ADR-0001).
  # WAXFLOW_REQUIRE_FFMPEG=1 and WAXFLOW_REQUIRE_FLAC=1 escalate the
  # oracle tests' self-skips to hard failures on this job, and
  # WAXFLOW_REQUIRE_VECTORS=1 does the
  # same for the SHA-256-pinned conformance vectors (cached across runs,
  # keyed by the pin list).
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg flac
      - uses: actions/cache@v4
        with:
          path: testdata/vectors
          key: vectors-${{ hashFiles('internal/testutil/vectors.go') }}
      - run: make verify-vectors
      - run: WAXFLOW_REQUIRE_FFMPEG=1 WAXFLOW_REQUIRE_FLAC=1 WAXFLOW_REQUIRE_VECTORS=1 go test -race -timeout 30m ./...

  # 2 min per fuzz target; nightly.yml runs the long soak. Finds every
  # native Fuzz* target automatically. scripts/fuzz.sh classifies outcomes so
  # only a real crasher fails the job (not Go's end-of-run timeout artifact);
  # a finding is echoed into the log and uploaded as an artifact.
  fuzz-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: fuzz every target for 2 minutes
        run: bash scripts/fuzz.sh 2m
      - name: upload fuzz logs and any reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-short-findings
          path: |
            fuzz-logs/
            **/testdata/fuzz/**
          if-no-files-found: ignore
