name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.26.3"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make fmt-check
      - run: make vet
      - run: go build ./...
      - run: make test

  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make depcheck

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build all release targets
        run: |
          set -eu
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
              go build -trimpath ./...
            echo "ok $target"
          done

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci

  # ffmpeg is a TEST ORACLE only, never a runtime dependency (ADR-0001).
  # The differential harness lands with the first codec;
  # WAXFLOW_REQUIRE_FFMPEG=1 escalates
  # its self-skipping tests to hard failures on this job.
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: WAXFLOW_REQUIRE_FFMPEG=1 go test -race ./...

  # 2 min per fuzz target; nightly.yml (lands with the first parser)
  # runs the long soak. Finds every native Fuzz* target automatically.
  fuzz-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: run each fuzz target for 2 minutes
        run: |
          set -eu
          for pkg in $(go list ./...); do
            for target in $(go test -list '^Fuzz' "$pkg" 2>/dev/null | grep '^Fuzz' || true); do
              echo "fuzzing $pkg $target"
              go test -run '^$' -fuzz "^${target}\$" -fuzztime 2m "$pkg"
            done
          done
