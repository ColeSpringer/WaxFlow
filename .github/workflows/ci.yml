name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.26.3"

jobs:
  # One pass per OS, no double-run: the whole-tree race pass on ubuntu (races
  # are caught here), and the non-race functional suite on macOS for
  # portability. Linux's enforcing non-race run with the ffmpeg/vector oracles
  # is the differential job below, so the ubuntu leg does not repeat a plain
  # non-race pass, and the ~10x-cost macOS runner skips the race build.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make fmt-check
      - run: make vet
      - run: go build ./...
      - name: whole-tree race pass (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: make test-race
      - name: non-race functional pass (macOS portability)
        if: matrix.os == 'macos-latest'
        run: make test

  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make depcheck

  # The nested modules: ./... at the root stops at their go.mod
  # boundaries, so each builds and tests here. cli carries the cobra
  # CLI plus the waxlabel mapper, resolver the WaxBin flavor (its suite
  # includes the real-WaxBin integration tests; the catalog is authored
  # through the waxbin library over temp files, no external services),
  # and oracletest the third-party-oracle tests that keep the root
  # module's require block empty.
  nested-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make test-cli
      - run: make test-resolver
      - run: make test-oracle
      - run: make build
      - run: make build-waxbin

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build all release targets
        run: |
          set -eu
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
              go build -trimpath ./...
            GOOS="${target%/*}" GOARCH="${target#*/}" CGO_ENABLED=0 \
              go build -C cli -trimpath ./...
            echo "ok $target"
          done

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci
      - name: build waxbin flavor image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci
            MAIN_PKG=./resolver/cmd/waxflow

  # ffmpeg is a TEST ORACLE only, never a runtime dependency.
  # WAXFLOW_REQUIRE_FFMPEG=1 and WAXFLOW_REQUIRE_FLAC=1 escalate the
  # oracle tests' self-skips to hard failures on this job, and
  # WAXFLOW_REQUIRE_VECTORS=1 does the same for the SHA-256-pinned
  # conformance vectors (cached across runs, keyed by the pin list). The run
  # is non-race: this job enforces the differential/conformance oracles (all
  # single-goroutine numeric), and the concurrency race coverage is the
  # separate `make test-race` pass in the test job. The Opus conformance
  # suite runs here too (it self-skips only under -race, so a non-race run
  # exercises it in-line).
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg flac
      - uses: actions/cache@v6
        with:
          path: testdata/vectors
          key: vectors-${{ hashFiles('internal/testutil/vectors.go') }}
      - run: make verify-vectors
      - run: WAXFLOW_REQUIRE_FFMPEG=1 WAXFLOW_REQUIRE_FLAC=1 WAXFLOW_REQUIRE_VECTORS=1 go test -timeout 30m ./...

  # 45s per fuzz target; nightly.yml runs the long soak. Finds every
  # native Fuzz* target automatically. scripts/fuzz.sh classifies outcomes so
  # only a real crasher fails the job (not Go's end-of-run timeout artifact);
  # a finding is echoed into the log and uploaded as an artifact.
  fuzz-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: fuzz every target for 45 seconds
        run: bash scripts/fuzz.sh 45s
      - name: upload fuzz logs and any reproducers
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-short-findings
          path: |
            fuzz-logs/
            **/testdata/fuzz/**
          if-no-files-found: ignore
