name: nightly

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  GO_VERSION: "1.26.3"

jobs:
  # Long fuzz soak over every native fuzz target: 20 minutes per target
  # nightly versus the 2-minute smoke in ci.yml. New Fuzz* functions are
  # picked up automatically. scripts/fuzz.sh fails the job only on a real
  # crasher (a reproducer written under testdata/fuzz), not on Go's benign
  # end-of-run "context deadline exceeded"; a real finding is echoed into
  # this log and uploaded below so it survives the ephemeral runner.
  fuzz-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: fuzz every target for 20 minutes
        run: bash scripts/fuzz.sh 20m
      - name: upload fuzz logs and any reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-soak-findings
          path: |
            fuzz-logs/
            **/testdata/fuzz/**
          if-no-files-found: ignore

  # The full suite with the differential oracle and conformance vectors
  # required, so a broken comparison cannot hide behind a skip.
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg flac
      - uses: actions/cache@v4
        with:
          path: testdata/vectors
          key: vectors-${{ hashFiles('internal/testutil/vectors.go') }}
      - run: make verify-vectors
      - run: WAXFLOW_REQUIRE_FFMPEG=1 WAXFLOW_REQUIRE_FLAC=1 WAXFLOW_REQUIRE_VECTORS=1 go test -race -count=1 -timeout 30m ./...
      # Opus conformance skips itself under -race (see ci.yml); run it non-race.
      - run: WAXFLOW_REQUIRE_VECTORS=1 go test -count=1 -timeout 30m -run 'TestConformanceVectors' ./codec/opus/

  # hls.js end to end in a real browser: a live daemon over a generated
  # library, the committed /demo page, headless Chromium via Playwright
  # (scripts/hls-e2e.mjs; docs/hls-validation.md).
  hls-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install playwright && npx playwright install --with-deps chromium
      - run: make hls-e2e

  # Encoder-quality gates: score our lossy encoders against the reference
  # baselines (Shine for MP3 and ffmpeg's native aac for AAC via the
  # ODG-proxy; libopus for Opus via the reference opus_demo/opus_compare
  # built from the pinned source), enforce the docs/quality-gates.md gates,
  # and upload the HTML reports. libshine ships in Ubuntu's ffmpeg build;
  # the libopus tools are built by `make opus-tools` and cached alongside
  # the pinned corpus.
  encoder-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: actions/cache@v4
        with:
          path: |
            testdata/vectors
            testdata/tools
          key: quality-${{ hashFiles('internal/testutil/vectors.go') }}
      - run: go run ./internal/testutil/cmd/vectorfetch opus/corpus/
      - run: make opus-tools
      - run: make encoder-quality QUALITY_REPORT=quality-report.html AAC_QUALITY_REPORT=aac-quality-report.html OPUS_QUALITY_REPORT=opus-quality-report.html
      - name: upload the encoder-quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: encoder-quality-report
          path: |
            quality-report.html
            aac-quality-report.html
            opus-quality-report.html
          if-no-files-found: ignore
