# Tag-driven release: push a v* tag -> binaries + SHA256SUMS on a GitHub
# release, plus a multi-arch image on ghcr.io. Hand-rolled per family
# convention (no goreleaser).
name: release

on:
  push:
    tags: ["v*"]

env:
  GO_VERSION: "1.26.3"
  IMAGE: ghcr.io/colespringer/waxflow

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make check
      - name: build release binaries
        run: |
          set -eu
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos="${target%/*}"; goarch="${target#*/}"
            bin="waxflow"; [ "$goos" = windows ] && bin="waxflow.exe"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -C cli -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "../build/$bin" ./cmd/waxflow
            name="waxflow_${GITHUB_REF_NAME}_${goos}_${goarch}"
            if [ "$goos" = windows ]; then
              (cd build && zip -q "../dist/${name}.zip" "$bin")
            else
              tar -C build -czf "dist/${name}.tar.gz" "$bin"
            fi
            rm -rf build
          done
      - name: checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "waxflow $GITHUB_REF_NAME" --generate-notes

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      # Multi-arch (amd64 + arm64): self-hosters run Pi/ARM NAS boxes.
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
      # The WaxBin resolver flavor: identical CLI plus pid:<ULID> source
      # resolution against a WaxBin catalog (compose.full.yaml uses it).
      - name: waxbin flavor image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            MAIN_PKG=./resolver/cmd/waxflow
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}-waxbin
            ${{ env.IMAGE }}:latest-waxbin
