# Hardened base layer, not meant to run alone; compose.yaml (standalone)
# and compose.full.yaml (WaxBin stack) extend it.
#
# Exposure note (ADR-0007): this layer widens the listen address to
# 0.0.0.0 inside the container. Put TLS in front (native tlsCert/tlsKey or
# a terminating reverse proxy) before exposing the published port beyond
# your LAN.
services:
  waxflow:
    image: ghcr.io/colespringer/waxflow:latest
    environment:
      WAXFLOW_ADDR: 0.0.0.0:4418
      # Fail-closed rule: a non-loopback listen address requires API keys
      # (or an explicit WAXFLOW_ALLOW_UNAUTHENTICATED=true, LAN-only).
      WAXFLOW_API_KEYS: ${WAXFLOW_API_KEYS:?set WAXFLOW_API_KEYS (comma-separated) or override allowUnauthenticated}
    ports:
      - "4418:4418"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - waxflow-data:/data
      - waxflow-cache:/cache
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
