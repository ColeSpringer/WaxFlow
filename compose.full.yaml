# Full Wax stack: the resolver flavor over WaxBin's library and catalog,
# lighting up src=pid: references. Library volumes are read-only. The
# catalog directory is not: WaxFlow opens the database itself read-only
# (never taking WaxBin's write lock), but SQLite WAL readers still write
# read-marks into the -shm sidecar beside it, so the daemon's UID
# (10001) needs read access to the catalog files and write access to
# the -wal/-shm sidecars in that directory.
services:
  waxflow:
    extends:
      file: compose.base.yaml
      service: waxflow
    image: ghcr.io/colespringer/waxflow:latest-waxbin
    environment:
      WAXFLOW_ROOTS: lib=/library
      WAXFLOW_CATALOG_DB: /catalog/waxbin.db
    volumes:
      - ${WAXFLOW_LIBRARY:-./library}:/library:ro
      # The directory holding waxbin.db and its -wal/-shm sidecars.
      - ${WAXBIN_DATA:-./waxbin}:/catalog

volumes:
  waxflow-data:
  waxflow-cache:
